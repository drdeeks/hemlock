# ============================================================
# Agent: skills — Hermes agent config
# Generated: 20260417T174900Z
# Managed by agent-bootstrap.sh
# ============================================================
#
# This is a complete config with all available options.
# The model/provider settings MUST match what you set in .env.
#
# To change provider: edit BOTH this file AND .env
# To add fallback: uncomment fallback_model section
#

# ── Model (REQUIRED — must match .env provider key) ──────────────
#
# Uncomment the block matching the provider key you set in .env
#

model:
  default: xiaomi/mimo-v2-pro
  provider: nous
  base_url: https://inference-api.nousresearch.com/v1
  api_mode: chat_completions

# --- For OpenRouter: ---
# model:
#   default: meta-llama/llama-3.1-70b-instruct
#   provider: openrouter
#   base_url: https://openrouter.ai/api/v1
#   api_mode: chat_completions

# --- For OpenAI: ---
# model:
#   default: gpt-4o
#   provider: openai
#   base_url: https://api.openai.com/v1
#   api_mode: chat_completions

# --- For Anthropic: ---
# model:
#   default: claude-sonnet-4-20250514
#   provider: anthropic
#   base_url: https://api.anthropic.com/v1
#   api_mode: chat_completions

# --- For Local Ollama: ---
# model:
#   default: qwen2.5:7b
#   provider: ollama
#   base_url: http://localhost:11434/v1
#   api_mode: chat_completions

# ── Fallback (optional — activates on primary failure) ───────────
#
# fallback_model:
#   provider: openrouter
#   model: google/gemini-2.5-flash
#   base_url: https://openrouter.ai/api/v1

# ── Providers (leave empty — keys come from .env) ───────────────
providers: {}
fallback_providers: []

# ── Toolsets ─────────────────────────────────────────────────────
toolsets:
- hermes-cli

# ── Agent behavior ───────────────────────────────────────────────
agent:
  max_turns: 60
  gateway_timeout: 1800
  gateway_timeout_warning: 900
  tool_use_enforcement: auto
  verbose: false
  reasoning_effort: medium

# ── Terminal ─────────────────────────────────────────────────────
terminal:
  backend: local
  cwd: /home/drdeek/.openclaw/agents/skills
  timeout: 180
  persistent_shell: true

# ── Memory ───────────────────────────────────────────────────────
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6

# ── Compression (auto-compresses long conversations) ─────────────
compression:
  enabled: true
  threshold: 0.77
  target_ratio: 0.2
  protect_last_n: 20

# ── Skills ───────────────────────────────────────────────────────
skills:
  creation_nudge_interval: 15

# ── Delegation (subagent spawning) ──────────────────────────────────
delegation:
  mode: manual
  timeout: 60
  max_concurrent_children: 3

# ── Approvals ────────────────────────────────────────────────────
approvals:
  mode: manual
  timeout: 60

# ── Credential pool strategies ───────────────────────────────────
credential_pool_strategies:
  openrouter: round_robin
  copilot: fill_first
  nous: fill_first

# ── Context ──────────────────────────────────────────────────────
context:
  file_read_max_chars: 100000
  group_sessions_per_user: true
  prefill_messages_file: ''

# ── Streaming ────────────────────────────────────────────────────
streaming: true

# ── Security ─────────────────────────────────────────────────────
security:
  redact_secrets: true
  tirith_enabled: true
  tirith_timeout: 5
  tirith_fail_open: true

# ── Privacy ──────────────────────────────────────────────────────
privacy: {}

# ── Cron ─────────────────────────────────────────────────────────
cron:
  enabled: true
  check_interval: 60

# ── Code execution ───────────────────────────────────────────────
code_execution:
  backend: local
  timeout: 180

# ── Browser ──────────────────────────────────────────────────────
browser:
  enabled: false
  provider: browserbase

# ── Checkpoints ──────────────────────────────────────────────────
checkpoints:
  enabled: true
  max_per_session: 10

# ── Auxiliary (vision, summarization) ────────────────────────────
auxiliary: {}

# ── Human delay (typing simulation) ─────────────────────────────
human_delay:
  enabled: false
  min_ms: 50
  max_ms: 200

# ── Smart model routing ─────────────────────────────────────────
smart_model_routing: {}

# ── Command allowlist ────────────────────────────────────────────
command_allowlist: {}

# ── Quick commands ───────────────────────────────────────────────
quick_commands: {}

# ── Platform toolsets ────────────────────────────────────────────
platform_toolsets: {}

# ── Platform configs ─────────────────────────────────────────────
discord: {}
whatsapp: {}

# ── TTS / STT / Voice ───────────────────────────────────────────
tts: {}
stt: {}
voice: {}

# ── Honcho (session memory service) ──────────────────────────────
honcho: {}

# ── Personalities ────────────────────────────────────────────────
personalities: {}

# ── Logging ──────────────────────────────────────────────────────
logging:
  level: INFO
  max_size_mb: 5
  backup_count: 3

# ── Session reset ────────────────────────────────────────────────
session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4

# ── Display ──────────────────────────────────────────────────────
display:
  compact: false
  personality: helpful
  show_reasoning: false
  streaming: true

# ── Timezone ─────────────────────────────────────────────────────
timezone: ''

# ── Version (do not change) ──────────────────────────────────────
_config_version: 14
